});
   map.on('mouseenter', 'proto_fossils', (e) => {
    map.getCanvas().style.cursor = 'pointer'; // Change cursor to pointer

    // Access properties and coordinates from the feature
    const props = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates.slice();

    // Create custom HTML with multiple details
    const content = `
        <div>
            <h3>${props.SPECIES}</h3>
            <p>Period: ${props.PERIOD}</p>
            <p>Epoch: ${props.EPOCH}</p>
            <p>Stage: ${props.STAGE}</p>
            <p>Formation: ${props.FORMATION}</p>
            <p>Paleo Environment: ${props.PAL_ENV}</p>
            <p>Paleo Climate: ${props.PAL_CLIM}</p>
            <p>Rock Types: ${props.PRIM_ROCK} ${props.SEC_ROCK} ${props.THIRD_ROCK} </p>
            <p>Rock Composition: ${props.PRIM_COMP} ${props.SEC_COMP} ${props.THIR_COMP} </p>
        </div>
    `;
    
    // Add popup to map
    popup.setLngLat(coords).setHTML(content).addTo(map);
});
